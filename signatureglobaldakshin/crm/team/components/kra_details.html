    <!-- time schedule for disabling fiields -->

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const input2pm = document.getElementById('callyzer_2pm');
            const input5pm = document.getElementById('callyzer_5pm');
            const input8pm = document.getElementById('callyzer_8pm');
        
            function controlFieldAccessByTime() {
                const now = new Date();
                const hour = now.getHours();
        
                // Disable all by default
                input2pm.disabled = true;
                input5pm.disabled = true;
                input8pm.disabled = true;
        
                // Logic to enable based on time ranges
                if (hour >= 14 && hour < 17) {
                    // 2pm to 5pm → enable only 2PM field
                    input2pm.disabled = false;
                } else if (hour >= 17 && hour < 20) {
                    // 5pm to 8pm → enable only 5PM field
                    input5pm.disabled = false;
                } else if (hour >= 20 && hour < 24) {
                    // 8pm to 12am → enable only 8PM field
                    input8pm.disabled = false;
                }
                // else between 12am to 2pm all remain disabled
            }
        
            controlFieldAccessByTime(); // Run on load
        
            // Optional: re-check every 5 minutes
            setInterval(controlFieldAccessByTime, 12000); // 5 mins = 300,000 ms
        });
        </script>
