<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book your Meeting with Experts</title>
    <link rel="icon" href="https://blanchedalmond-squid-383723.hostingersite.com/assets/imgs/favicon/favicon.ico" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Teko:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">

</head>
<body>
    
    <div class="form-container">
        <div class="form-header">
            <img src="assets/img/logo-1.png" alt="Proptree Logo" class="logo">
            <h3>Schedule Your Meeting Now!</h3>
        </div>

        <form id="eventForm" action="php/submit.php" method="POST">
            <div class="form-group">
                <label for="client-name">Name</label>
                <input type="text" id="client-name" name="client_name" placeholder="e.g., Anjali Sharma" required>
            </div>

            <div class="form-group">
                <label for="contact-no">Contact No.</label>
                <input type="tel" id="contact-no" name="contact_no" placeholder="e.g., 9876543210" required minlength="10" maxlength="10" pattern="[6-9][0-9]{9}" title="Please enter a valid 10-digit Indian mobile number" inputmode="numeric">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="e.g., anjali.sharma@example.com" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required placeholder="Select Date">
                </div>
                
                <div class="form-group">
                    <label for="time">Time Slot</label>
                    <select id="time" name="timing" required>
                        <option value="" disabled selected>-- Select a time --</option>
                        <option value="09:00 AM">09:00 AM</option>
                        <option value="10:00 AM">10:00 AM</option>
                        <option value="11:00 AM">11:00 AM</option>
                        <option value="12:00 PM">12:00 PM</option>
                        <option value="01:00 PM">01:00 PM</option>
                        <option value="02:00 PM">02:00 PM</option>
                        <option value="03:00 PM">03:00 PM</option>
                        <option value="04:00 PM">04:00 PM</option>
                        <option value="05:00 PM">05:00 PM</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="code-id">Employee Code</label>
                <input type="text" id="code-id" name="code_id" placeholder="Enter the ID provided by your inviter" required>
            </div>

            <button type="submit" class="submit-btn">Book Now</button>
        </form>
    </div>

    <div id="notificationContainer"></div>
    
    <script src="main.js"></script>

</body>
</html>
