<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book your Meeting with Experts</title>
    <link rel="icon" href="https://rohitsinghrealestate.in/assets/imgs/favicon/favicon.ico" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Teko:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "t305n1wrm5");
    </script>

</head>
<body>
    
    <div class="form-container">
        <div class="form-header">
            <img src="assets/img/logo-1.png" alt="Proptree Logo" class="logo">
            <h3>Share You feedback Now!</h3>
        </div>

        <form id="eventForm" action="php/submit-feedback.php" method="POST">
            <div class="form-group">
                <label for="client-name">Name</label>
                <input type="text" id="client-name" name="client_name" placeholder="e.g., Anjali Sharma" required>
            </div>

            <div class="form-group">
                <label for="contact-no">Contact No.</label>
                <input type="tel" id="contact-no" name="contact_no" placeholder="e.g., 9876543210" required minlength="10" maxlength="10" pattern="[6-9][0-9]{9}" title="Please enter a valid 10-digit Indian mobile number" inputmode="numeric">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="e.g., anjali.sharma@example.com" required>
            </div>

            <div class="form-group">
                <label for="email">Feedback</label>
                <textarea name="feedback" id="feedback" placeholder="Write Your Feedback.."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>

    <div id="notificationContainer"></div>
    
    <script src="main.js"></script>

</body>
</html>
