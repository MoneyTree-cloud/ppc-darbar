<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login</title>

<script type='module' src='https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js'></script>
<script nomodule src='https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js'></script>

<style>
:root{
 --primary:#6366f1;
 --accent:#a78bfa;
 --bg:#f5f7fb;
}

/* RESET */
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Segoe UI',sans-serif;
}

/* BODY */
body{
 min-height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 background:linear-gradient(135deg,#ffffff,#eef2ff);
 overflow:hidden;
 position:relative;
}

/* SOFT FLOATING LIGHTS */
body::before,
body::after{
 content:'';
 position:absolute;
 width:400px;
 height:400px;
 border-radius:50%;
 filter:blur(100px);
 opacity:0.5;
}

body::before{
 background:#c7d2fe;
 top:-100px;
 left:-100px;
}

body::after{
 background:#ddd6fe;
 bottom:-100px;
 right:-100px;
}

/* LOGIN CARD */
.box{
 width:100%;
 max-width:380px;
 padding:40px 30px;
 border-radius:18px;
 background:rgba(255,255,255,0.75);
 backdrop-filter:blur(18px);
 border:1px solid rgba(255,255,255,0.6);
 box-shadow:0 30px 60px rgba(99,102,241,0.15);
 text-align:center;
 transition:0.4s ease;
}

/* SOFT 3D HOVER */
.box:hover{
 transform:translateY(-6px) scale(1.01);
 box-shadow:0 40px 80px rgba(99,102,241,0.25);
}

.box h2{
 margin-bottom:28px;
 color:#374151;
 font-weight:600;
}

/* INPUTS */
.inputBx{
 position:relative;
 margin-bottom:20px;
}

.inputBx input{
 width:100%;
 padding:14px 46px 14px 16px;
 border-radius:12px;
 border:1px solid #e5e7eb;
 background:white;
 font-size:15px;
 transition:0.3s;
}

.inputBx input:focus{
 outline:none;
 border-color:var(--primary);
 box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

.inputBx ion-icon{
 position:absolute;
 right:14px;
 top:50%;
 transform:translateY(-50%);
 font-size:20px;
 cursor:pointer;
 color:#6b7280;
}

/* BUTTON */
.inputBx input[type="submit"]{
 background:linear-gradient(135deg,var(--primary),var(--accent));
 color:white;
 font-weight:600;
 border:none;
 cursor:pointer;
 box-shadow:0 10px 25px rgba(99,102,241,0.25);
}

.inputBx input[type="submit"]:hover{
 transform:translateY(-2px);
 box-shadow:0 18px 35px rgba(99,102,241,0.35);
}

/* MOBILE */
@media(max-width:480px){
 .box{padding:30px 20px;}
}
</style>
</head>

<body>

<div class="box" id="card">
<form action="php/admin_login.php" method="post">
<h2>Admin Access</h2>

<div class="inputBx">
<input type="text" name="adminName" id="adminName" placeholder="Username" required>
</div>

<div class="inputBx">
<input type="password" name="password" id="password" placeholder="Password" required>
<ion-icon name="eye-outline" id="eye"></ion-icon>
</div>

<div class="inputBx">
<input type="submit" value="Login">
</div>

</form>
</div>

<script>
/* PASSWORD TOGGLE */
var eye=document.getElementById('eye');
var password=document.getElementById('password');

eye.addEventListener("click",()=>{
 if(eye.getAttribute("name")==="eye-outline"){
  eye.setAttribute("name","eye-off-outline");
  password.type="text";
 }else{
  eye.setAttribute("name","eye-outline");
  password.type="password";
 }
});

/* SOFT MOUSE 3D TILT */
const card=document.getElementById("card");
document.addEventListener("mousemove",(e)=>{
 let x=(window.innerWidth/2-e.pageX)/60;
 let y=(window.innerHeight/2-e.pageY)/60;
 card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
